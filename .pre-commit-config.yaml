repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: biome-check-v2
        name: biome check (frontend-v2)
        entry: bash -c 'cd frontend-v2 && npx biome check --fix'
        language: system
        files: ^frontend-v2/.*\.(ts|tsx|js|json)$
        pass_filenames: false
