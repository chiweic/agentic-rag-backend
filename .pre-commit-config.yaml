repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: biome-check
        name: biome check (frontend-v1)
        entry: npx biome check --fix
        language: system
        files: ^frontend-v1/.*\.(ts|tsx|js|json)$
        pass_filenames: false
      - id: biome-check-v2
        name: biome check (frontend-v2)
        entry: npx --prefix frontend-v2 biome check --fix
        language: system
        files: ^frontend-v2/.*\.(ts|tsx|js|json)$
        pass_filenames: false
