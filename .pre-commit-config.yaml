repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: biome-check-frontend
        name: biome check (frontend)
        entry: bash -c 'cd frontend && npx biome check --fix'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|json)$
        pass_filenames: false
      - id: expo-lint-mobile-v3
        name: expo lint (mobile-v3)
        entry: bash -c 'cd mobile-v3 && npx expo lint 2>&1 | head -30; exit ${PIPESTATUS[0]}'
        language: system
        files: ^mobile-v3/.*\.(ts|tsx)$
        pass_filenames: false
